<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Car Review</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
    h1 { text-align: center; }
    .section { margin-bottom: 20px; }
    label { display: block; font-weight: bold; margin-bottom: 4px; }
    input, textarea, select { width: 100%; padding: 8px; box-sizing: border-box; }
    .stars { font-size: 1.5rem; color: gold; }
    button { padding: 10px 24px; background: #222; color: #fff; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Car Review</h1>
  <form>
    <div class="section">
      <label>Car Make & Model</label>
      <input type="text" placeholder="e.g. Toyota Camry 2024" />
    </div>
    <div class="section">
      <label>Year</label>
      <input type="number" placeholder="e.g. 2024" min="1900" max="2100" />
    </div>
    <div class="section">
      <label>Overall Rating</label>
      <select>
        <option value="">-- Select --</option>
        <option>⭐ 1 - Poor</option>
        <option>⭐⭐ 2 - Fair</option>
        <option>⭐⭐⭐ 3 - Good</option>
        <option>⭐⭐⭐⭐ 4 - Very Good</option>
        <option>⭐⭐⭐⭐⭐ 5 - Excellent</option>
      </select>
    </div>
    <div class="section">
      <label>Pros</label>
      <textarea rows="3" placeholder="What did you like?"></textarea>
    </div>
    <div class="section">
      <label>Cons</label>
      <textarea rows="3" placeholder="What could be improved?"></textarea>
    </div>
    <div class="section">
      <label>Full Review</label>
      <textarea rows="5" placeholder="Write your detailed review here..."></textarea>
    </div>
    <div class="section">
      <label>Reviewer Name</label>
      <input type="text" placeholder="Your name" />
    </div>
    <button type="submit">Submit Review</button>
  </form>
</body>
</html>
